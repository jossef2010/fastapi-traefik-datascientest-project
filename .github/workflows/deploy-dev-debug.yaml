name: Deploy Dev Debug tests

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: fastapi-liora
  BACKEND_IMAGE: ghcr.io/fastapi-liora/fastapi-traefik-datascientest-project-backend
  FRONTEND_IMAGE: ghcr.io/fastapi-liora/fastapi-traefik-datascientest-project-frontend

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          pip install uv
          uv sync --dev

      - name: Start PostgreSQL
        run: |
          docker rm -f test-db || true
          docker run -d \
            --name test-db \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=testpass \
            -e POSTGRES_DB=test_db \
            -p 5432:5432 \
            postgres:15

          echo "Waiting for DB to be ready..."
          sleep 5

      - name: Set test database URL
        run: |
          echo "DATABASE_URL=postgresql://postgres:testpass@localhost/test_db" >> $GITHUB_ENV

      - name: Run backend tests
        working-directory: ./backend
        run: |
          uv run pytest app/tests/crud/test_user.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build