name: Deploy Dev

on:
  push:
    branches:
      - dev

permissions:
  contents: read

jobs:
  deploy-dev:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Write kubeconfig
        run: |
          mkdir -p $HOME/.kube
          printf '%s' "${{ secrets.KUBECONFIG_DEV }}" > $HOME/.kube/config-ci
          chmod 600 $HOME/.kube/config-ci
          echo "KUBECONFIG=$HOME/.kube/config-ci" >> $GITHUB_ENV

      - name: Apply dev manifests
        run: |
          kubectl apply -f k8s/dev

      - name: Restart backend deployment
        run: |
          kubectl rollout restart deployment/backend -n dev

      - name: Restart frontend deployment
        run: |
          kubectl rollout restart deployment/frontend -n dev

      - name: Wait for backend rollout
        run: |
          kubectl rollout status deployment/backend -n dev --timeout=180s

      - name: Wait for frontend rollout
        run: |
          kubectl rollout status deployment/frontend -n dev --timeout=180s

      - name: Check resources
        run: |
          kubectl get pods -n dev
          kubectl get svc -n dev