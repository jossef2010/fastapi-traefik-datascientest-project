name: Deploy Dev

on:
  push:
    branches:
      - dev
      - "feat/k8s-dev-setup"

permissions:
  contents: read

jobs:
  deploy-dev:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Da wir auf dem Self-hosted Runner (deiner VM) sind, 
      # nutzen wir direkt das installierte Minikube.
      
      - name: Apply dev manifests
        run: |
          # --validate=false ist entscheidend, um den "no route to host" Fehler zu umgehen.
          # Wir nutzen "minikube kubectl", da es den Kontext automatisch richtig setzt.
          minikube kubectl -- apply -f k8s/dev --validate=false

      - name: Restart deployments
        run: |
          # Erzwingt das Laden der neuen Images von GHCR
          minikube kubectl -- rollout restart deployment/backend -n dev
          minikube kubectl -- rollout restart deployment/frontend -n dev

      - name: Wait for rollout
        run: |
          minikube kubectl -- rollout status deployment/backend -n dev --timeout=180s
          minikube kubectl -- rollout status deployment/frontend -n dev --timeout=180s

      - name: Check resources
        run: |
          minikube kubectl -- get pods -n dev
          minikube kubectl -- get svc -n dev